# Prometheus configuration for PSI Runtime SDK
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'psi-runtime-api'
    static_configs:
      - targets: ['psi-runtime-api:8000']
    scrape_interval: 5s
    metrics_path: /metrics

  - job_name: 'psi-runtime-dev'
    static_configs:
      - targets: ['psi-runtime-dev:8000']
    scrape_interval: 5s
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']